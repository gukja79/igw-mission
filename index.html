<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#5a4fd6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="선교회계">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>선교 오프라인 회계</title>
<style>
  :root{
    --bg1:#6d5ef0; --bg2:#5a4fd6;
    --card:#ffffff; --label:#374151; --line:#e5e7eb; --fill:#f3f4f6;
    --ink:#111827; --muted:#6b7280; --accent:#2563eb;
    --green:#16a34a; --green-d:#15803d;
    --red-bg:#fee2e2; --red:#dc2626;
    --grn-bg:#dcfce7; --grn:#16a34a;
    --blu-bg:#dbeafe; --blu:#2563eb;
    --amb-bg:#fef3c7; --amb:#b45309;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2)); min-height:100vh;
    color:var(--ink); padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
  }
  .wrap{max-width:480px; margin:0 auto; padding:16px 0 40px}
  .card{background:var(--card); border-radius:22px; padding:18px 16px; margin-bottom:14px;
    box-shadow:0 8px 30px rgba(0,0,0,.12)}

  /* 첫 실행 - 팀 선택 */
  #setup .ttl{font-size:20px; font-weight:700; text-align:center; margin:6px 0 4px}
  #setup .sub{font-size:14px; color:var(--muted); text-align:center; margin-bottom:18px}
  .team-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .team-btn{padding:18px 10px; border:1.5px solid var(--line); border-radius:14px; background:var(--fill);
    font-size:16px; font-weight:600; color:var(--ink); cursor:pointer}
  .team-btn:active{background:#e9eaf0}

  /* 헤더/탭 */
  .head{display:flex; align-items:center; justify-content:space-between; color:#fff; padding:2px 4px 14px}
  .head .team{font-size:18px; font-weight:700}
  .head .chg{font-size:12px; color:#e7e3ff; background:rgba(255,255,255,.18);
    padding:6px 10px; border-radius:999px; border:none; cursor:pointer}
  .tabs{display:flex; gap:6px; background:rgba(255,255,255,.18); padding:5px; border-radius:14px; margin-bottom:14px}
  .tab{flex:1; text-align:center; padding:10px; border-radius:10px; font-size:15px; font-weight:600;
    color:#efeeff; cursor:pointer; border:none; background:transparent}
  .tab.on{background:#fff; color:var(--bg2)}

  /* 폼 */
  label.fld{display:block; font-size:14px; font-weight:600; color:var(--label); margin:14px 2px 6px}
  label.fld:first-child{margin-top:2px}
  input,select,textarea{width:100%; padding:14px 14px; border:1px solid var(--line); border-radius:12px;
    background:var(--fill); font-size:16px; color:var(--ink); font-family:inherit; appearance:none}
  select{color:var(--accent); font-weight:600; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>"); background-repeat:no-repeat; background-position:right 14px center; padding-right:40px}
  textarea{min-height:60px; color:var(--ink); font-weight:400; resize:vertical}
  .fixed-val{padding:14px; background:#eef0ff; border:1px solid #dfe2ff; border-radius:12px;
    color:var(--accent); font-weight:600}
  .row2{display:flex; gap:10px}
  .row2>div{flex:1}

  /* 유형 토글 */
  .seg{display:flex; gap:8px}
  .seg button{flex:1; padding:13px; border:1.5px solid var(--line); border-radius:12px; background:var(--fill);
    font-size:15px; font-weight:600; color:var(--muted); cursor:pointer}
  .seg button.on-exp{background:var(--red-bg); border-color:var(--red); color:var(--red)}
  .seg button.on-inc{background:var(--grn-bg); border-color:var(--grn); color:var(--grn)}

  /* 사진 */
  .photos{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px}
  .thumb{width:72px; height:72px; border-radius:10px; object-fit:cover; border:1px solid var(--line); position:relative}
  .thumb-box{position:relative}
  .thumb-x{position:absolute; top:-6px; right:-6px; width:22px; height:22px; border-radius:50%;
    background:#111827; color:#fff; border:2px solid #fff; font-size:13px; line-height:18px; text-align:center; cursor:pointer}
  .addphoto{width:72px; height:72px; border-radius:10px; border:1.5px dashed #c7c9d6; background:var(--fill);
    display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; cursor:pointer; text-align:center; line-height:1.2}

  .save{width:100%; margin-top:20px; padding:16px; border:none; border-radius:14px; background:var(--green);
    color:#fff; font-size:17px; font-weight:700; cursor:pointer}
  .save:active{background:var(--green-d)}
  .save:disabled{opacity:.5}
  .ttl-sm{font-size:17px; font-weight:700; margin:2px 0 4px}
  .hint{font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:6px}
  .krw{font-size:14px; font-weight:700; margin:8px 2px 0; min-height:18px}
  .krw.ok{color:var(--green)}
  .krw.warn{color:#b45309}
  .amt-krw{font-size:17px; font-weight:700; color:var(--ink); margin-top:2px}
  .amt .fx{font-size:17px; font-weight:400; color:var(--muted)}

  /* 내역 목록 */
  .empty{text-align:center; color:var(--muted); padding:40px 10px; font-size:15px; line-height:1.6}
  .count{font-size:13px; color:var(--muted); margin:2px 2px 10px}
  .list-head{display:flex; align-items:center; justify-content:space-between; gap:10px}
  .list-head .count{margin:2px 2px 6px}
  .syncbtn{padding:9px 16px; border:none; border-radius:10px; background:var(--bg2); color:#fff;
    font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap}
  .syncbtn:disabled{opacity:.55}
  .head-btns{display:flex; gap:8px}
  .pullbtn{background:#fff; color:var(--bg2); border:1.5px solid var(--bg2)}
  #sync-status{font-size:12px; color:var(--muted); margin:0 2px 10px; min-height:14px}
  .item{border:1px solid var(--line); border-radius:14px; padding:12px; margin-bottom:10px}
  .item .top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px}
  .item .top > .amt{margin-left:auto}
  .item .num{font-size:12px; color:var(--muted); font-weight:600}
  .item .acct{font-size:15px; font-weight:700; margin:2px 0}
  .item .desc{font-size:13px; color:var(--muted); margin-bottom:6px; word-break:break-all}
  .item .amt{font-size:17px; font-weight:700; text-align:right; white-space:nowrap}
  .badges{display:flex; gap:5px; flex-wrap:wrap; margin-top:4px}
  .bd{font-size:11px; font-weight:700; padding:3px 8px; border-radius:999px}
  .bd-exp{background:var(--red-bg); color:var(--red)} .bd-inc{background:var(--grn-bg); color:var(--grn)}
  .bd-jw{background:var(--blu-bg); color:var(--blu)} .bd-jb{background:var(--amb-bg); color:var(--amb)}
  .bd-wait{background:#f3f4f6; color:#6b7280}
  .bd-fail{background:var(--red); color:#fff}
  .bd-edit{background:var(--amb); color:#fff}
  .bd-del{background:#7f1d1d; color:#fff}
  .bd-mirror{background:#fef3c7; color:#92400e; border:1px solid #f59e0b}
  .sheet-photos{display:flex; flex-wrap:wrap; gap:8px}
  .sheet-photo{display:inline-block; font-size:13px; font-weight:600; color:var(--blu); text-decoration:none; padding:4px 0}
  .item{cursor:pointer}
  .item .imgs{display:flex; gap:6px; margin-top:8px}
  .item .imgs img{width:52px; height:52px; border-radius:8px; object-fit:cover; border:1px solid var(--line)}
  .item .del{font-size:12px; color:#9ca3af; background:none; border:none; cursor:pointer; margin-top:8px; padding:0}
  .item .rephoto{font-size:12px; font-weight:700; color:var(--red); background:#fff; border:1px solid var(--red);
    border-radius:8px; padding:5px 10px; cursor:pointer; margin-top:8px; margin-right:10px}
  .more-btn{flex:0 0 auto; align-self:flex-start; width:34px; height:34px; border:none; border-radius:8px;
    background:var(--fill); color:var(--muted); font-size:20px; line-height:1; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center; padding:0; margin-left:4px}
  .more-btn:active{background:#e5e7eb}
  .item .thumb{cursor:zoom-in}
  .item .memo{font-size:13px; color:var(--muted); margin-top:8px; line-height:1.5; word-break:break-word}
  /* 사진 크게 보기(라이트박스) */
  .lightbox{position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:1000;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    padding:20px; overflow:auto}
  .lightbox img{max-width:96vw; max-height:88vh; object-fit:contain; border-radius:8px}
  .lightbox .lb-hint{position:fixed; top:14px; right:16px; color:#fff; font-size:14px; font-weight:600; opacity:.85}

  /* 수정 모드 바 (입력 폼 상단) */
  #edit-bar, #fx-edit-bar{display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:10px 12px; background:#fef3c7; border:1px solid #f59e0b; border-radius:10px;
    font-size:13px; font-weight:600; color:#b45309; margin-bottom:8px}
  #edit-bar button, #fx-edit-bar button{padding:6px 12px; border:none; border-radius:8px; background:#fff;
    color:var(--ink); font-size:12px; font-weight:700; cursor:pointer}

  /* 액션 시트 */
  #action-sheet, #fx-action-sheet{position:fixed; inset:0; z-index:60; display:flex; align-items:flex-end; justify-content:center}
  #action-sheet.hidden, #fx-action-sheet.hidden{display:none!important}
  #sheet-backdrop, #fx-sheet-backdrop{position:absolute; inset:0; background:rgba(0,0,0,.4)}
  #action-sheet .sheet, #fx-action-sheet .sheet{position:relative; background:#fff; width:100%; max-width:480px;
    border-radius:18px 18px 0 0; padding:14px 14px calc(14px + env(safe-area-inset-bottom));
    box-shadow:0 -8px 30px rgba(0,0,0,.18)}
  #action-sheet .sheet button, #fx-action-sheet .sheet button{display:block; width:100%; margin:6px 0; padding:14px;
    border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer}
  #act-edit, #act-fx-edit{background:var(--accent); color:#fff}
  #act-edit.disabled, #act-fx-edit.disabled{opacity:.4; pointer-events:none}
  #act-delete, #act-fx-delete{background:var(--red); color:#fff}
  #act-cancel, #act-fx-cancel{background:var(--fill); color:var(--ink)}
  .item .meta{font-size:12px; color:#9ca3af; margin-top:2px}

  /* 토스트 */
  #toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px);
    background:#111827; color:#fff; padding:12px 20px; border-radius:999px; font-size:14px; font-weight:600;
    opacity:0; transition:.25s; pointer-events:none; z-index:50}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .hidden{display:none!important}

  /* 깨진 b64 폴백 박스 */
  .img-broken{display:inline-flex; align-items:center; justify-content:center;
    background:var(--fill); color:var(--muted); font-size:11px; padding:4px; text-align:center}

  /* 업데이트 안내 바 */
  .updbar{position:fixed; left:12px; right:12px; bottom:calc(env(safe-area-inset-bottom) + 12px);
    max-width:456px; margin:0 auto; background:#111827; color:#fff; border-radius:14px;
    padding:12px 14px; display:flex; align-items:center; justify-content:space-between;
    gap:12px; box-shadow:0 8px 30px rgba(0,0,0,.3); z-index:1100; font-size:14px}
  .updbar button{background:#fff; color:#111827; border:none; border-radius:10px;
    padding:8px 14px; font-size:14px; font-weight:700; cursor:pointer}

  /* 버전 배지 (운영자 디버깅용 — 활성 sw 캐시 버전 표시) */
  .appver{margin-top:16px; text-align:center; font-size:11px; color:var(--muted);
    opacity:.6; -webkit-user-select:text; user-select:text}

  /* 사진 관리 모달 */
  #photo-mgr, #fx-photo-mgr{position:fixed; inset:0; z-index:70; display:flex; align-items:flex-end; justify-content:center}
  #photo-mgr.hidden, #fx-photo-mgr.hidden{display:none!important}
  #pmgr-backdrop, #fx-pmgr-backdrop{position:absolute; inset:0; background:rgba(0,0,0,.4)}
  #photo-mgr .sheet, #fx-photo-mgr .sheet{position:relative; background:#fff; width:100%; max-width:480px;
    border-radius:18px 18px 0 0; padding:16px 16px calc(env(safe-area-inset-bottom) + 16px)}
  .pmgr-ttl{font-size:17px; font-weight:700; text-align:center; margin:2px 0 10px}
  .pmgr-hint{font-size:12px; color:var(--amb); text-align:center; margin-bottom:8px}
  .pmgr-body{display:flex; flex-direction:column; gap:10px; max-height:50vh; overflow:auto; margin-bottom:12px}
  .pmgr-empty{font-size:14px; color:var(--muted); text-align:center; padding:16px 0}
  .pmgr-row{display:flex; align-items:center; justify-content:space-between; gap:12px;
    border:1px solid var(--line); border-radius:12px; padding:8px 10px}
  .pmgr-thumb{width:56px; height:56px; object-fit:cover; border-radius:8px; border:1px solid var(--line)}
  .pmgr-open{font-size:14px; font-weight:600; color:var(--blu); text-decoration:none}
  .pmgr-del{background:var(--red-bg); color:var(--red); border:none; border-radius:10px;
    padding:8px 14px; font-size:14px; font-weight:700; cursor:pointer}
  .pmgr-add{display:block; width:100%; padding:14px; border:none; border-radius:12px;
    background:var(--accent); color:#fff; font-size:15px; font-weight:700; cursor:pointer}
  .pmgr-add.disabled{opacity:.5}
  .pmgr-close{display:block; width:100%; margin-top:8px; padding:12px; border:none; border-radius:12px;
    background:var(--fill); color:var(--ink); font-size:14px; font-weight:600; cursor:pointer}

  /* 환전(FX) 화면 — 현재 환율 표시 + 환전 입력/목록 */
  .fx-rates{display:flex; flex-direction:column; gap:8px; margin:6px 0 4px}
  .fx-rate-row{display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--fill); border:1px solid var(--line); border-radius:12px; padding:11px 13px}
  .fx-rate-name{font-size:14px; font-weight:700; color:var(--accent)}
  .fx-rate-val{font-size:14px; font-weight:600; color:var(--ink)}
  .fx-na{color:var(--muted); font-weight:600}
  .fx-rate-empty{font-size:13px; color:var(--muted); background:var(--fill); border:1px dashed #c7c9d6;
    border-radius:12px; padding:14px; text-align:center; line-height:1.5}
  .fx-arrow{color:var(--muted); font-weight:400; margin:0 2px}
  .fx-l2{display:flex; align-items:center; justify-content:space-between; gap:10px;
    font-size:13px; color:var(--muted); padding:4px 2px 0}
  .fx-l2 b{color:var(--ink)}
  .fx-l2-btn{background:none; border:none; color:var(--blu); font-size:13px; font-weight:600; cursor:pointer; padding:4px}
  .fx-l2-add{width:100%; margin-top:4px; padding:11px; border:1.5px dashed #c7c9d6; border-radius:12px;
    background:var(--fill); color:var(--muted); font-size:13px; font-weight:600; cursor:pointer}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== 첫 실행: 팀 선택 ===== -->
  <div id="setup" class="card hidden">
    <div class="ttl">선교 오프라인 회계</div>
    <div class="sub">이 폰에서 사용할 팀을 선택하세요.<br>한 번 정하면 계속 고정됩니다.</div>
    <div class="team-grid" id="team-grid"></div>
  </div>

  <!-- ===== 메인 ===== -->
  <div id="main" class="hidden">
    <div class="head">
      <div class="team" id="head-team"></div>
      <div style="display:flex; gap:6px">
        <button class="chg" id="btn-rates">환율</button>
        <button class="chg" id="btn-change">팀 변경</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab on" id="tab-input">입력</button>
      <button class="tab" id="tab-list">내역</button>
    </div>

    <!-- 입력 화면 -->
    <div id="view-input" class="card">
      <div id="edit-bar" class="hidden">
        <span>수정 중 · 영수증 #<span id="edit-no"></span></span>
        <button type="button" id="btn-edit-cancel">취소</button>
      </div>
      <label class="fld">유형</label>
      <div class="seg">
        <button type="button" id="t-exp" class="on-exp">지출</button>
        <button type="button" id="t-inc">수입</button>
      </div>

      <label class="fld">분류</label>
      <div class="fixed-val" id="f-division"></div>

      <label class="fld">부서명</label>
      <div class="fixed-val" id="f-team"></div>

      <label class="fld">계정과목</label>
      <select id="f-account"></select>

      <label class="fld">지원금/자부담</label>
      <select id="f-fund"></select>

      <label class="fld">지출일 (영수증 날짜)</label>
      <input type="date" id="f-date">

      <label class="fld">내역</label>
      <input type="text" id="f-desc" placeholder="지출/수입 내역을 입력하세요">

      <label class="fld">사용 통화</label>
      <select id="f-currency"></select>

      <label class="fld">사용 금액</label>
      <input type="text" id="f-amount" inputmode="decimal" placeholder="0" autocomplete="off">
      <div id="krw-preview" class="krw"></div>

      <label class="fld">비고</label>
      <input type="text" id="f-note" placeholder="선택 입력 (예: 2번 결제, 대체영수증 등)">

      <label class="fld">영수증</label>
      <div class="seg" id="seg-receipt">
        <button type="button" id="r-o" class="on-inc" style="background:#eef0ff;border-color:#2563eb;color:#2563eb">있음 (O)</button>
        <button type="button" id="r-x">없음 (X)</button>
      </div>

      <div id="photo-section">
        <label class="fld">영수증 사진</label>
        <div class="photos" id="photos">
          <label class="addphoto">＋ 사진<input type="file" id="f-photo" accept="image/*" multiple class="hidden"></label>
        </div>
      </div>

      <button class="save" id="btn-save">저장</button>
    </div>

    <!-- 내역 화면 -->
    <div id="view-list" class="card hidden">
      <div class="list-head">
        <div class="count" id="list-count"></div>
        <div class="head-btns">
          <button class="syncbtn pullbtn" id="btn-pull">내려받기</button>
          <button class="syncbtn" id="btn-sync">동기화</button>
        </div>
      </div>
      <div id="sync-status"></div>
      <div id="list"></div>
      <input type="file" id="rephoto-input" accept="image/*" multiple class="hidden">
      <input type="file" id="addphoto-input" accept="image/*" multiple class="hidden">
    </div>

    <!-- 환전 화면 (현재 환율 표시 + 환전 입력/목록) -->
    <div id="view-fx" class="card hidden">
      <div class="ttl-sm">현재 환율</div>
      <div class="hint">환전 거래를 입력하면 통화별 평균환율이 자동으로 계산돼요. (정식 원화 환산은 시트가 합니다)</div>
      <div class="fx-rates" id="fx-rates"></div>

      <div class="ttl-sm" style="margin-top:20px">환전 입력</div>
      <div id="fx-edit-bar" class="hidden">
        <span>환전 수정 중</span>
        <button type="button" id="btn-fx-edit-cancel">취소</button>
      </div>
      <label class="fld">일자</label>
      <input type="date" id="fx-date">

      <label class="fld">준 통화 / 금액</label>
      <div class="row2">
        <div><select id="fx-from-cur"></select></div>
        <div><input type="text" id="fx-from-amt" inputmode="decimal" placeholder="0" autocomplete="off"></div>
      </div>

      <label class="fld">받은 통화 / 금액</label>
      <div class="row2">
        <div><select id="fx-to-cur"></select></div>
        <div><input type="text" id="fx-to-amt" inputmode="decimal" placeholder="0" autocomplete="off"></div>

/* =====================================================================
   IndexedDB (폰 내부 저장)
   ===================================================================== */
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open("igw_mission", 2);   // v1→v2: 환전(fx) 스토어 추가 (기존 entries 보존)
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains("entries"))
        d.createObjectStore("entries", { keyPath:"id" });
      if(!d.objectStoreNames.contains("fx"))
        d.createObjectStore("fx", { keyPath:"id" });
    };
    r.onsuccess = e => { db = e.target.result; res(db); };
    r.onerror  = e => rej(e.target.error);
  });
}
function tx(mode){ return db.transaction("entries", mode).objectStore("entries"); }
function saveEntry(o){ return new Promise((res,rej)=>{ const r=tx("readwrite").put(o); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); }); }
function getAll(){ return new Promise((res,rej)=>{ const r=tx("readonly").getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=e=>rej(e.target.error); }); }
function delEntry(id){ return new Promise((res,rej)=>{ const r=tx("readwrite").delete(id); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); }); }

// [§14] 환전(fx) 스토어 — 원장 entries 와 분리 보관
function fxTx(mode){ return db.transaction("fx", mode).objectStore("fx"); }
function fxSave(o){ return new Promise((res,rej)=>{ const r=fxTx("readwrite").put(o); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); }); }
function fxGetAll(){ return new Promise((res,rej)=>{ const r=fxTx("readonly").getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=e=>rej(e.target.error); }); }
function fxDel(id){ return new Promise((res,rej)=>{ const r=fxTx("readwrite").delete(id); r.onsuccess=()=>res(); r.onerror=e=>rej(e.target.error); }); }

/* =====================================================================
   사진 압축 (찍는 순간 가볍게)
   ===================================================================== */
function compress(file){
  return new Promise((res)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      const max = 1280;
      let {width:w, height:h} = img;
      if(!w || !h){ URL.revokeObjectURL(url); return res(null); }
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      const cv = document.createElement("canvas");
      cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      cv.toBlob(b=>res(b||null), "image/jpeg", 0.7);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); res(null); };  // 변환 불가 → null (원본째 올리지 않음)
    img.src=url;
  });
}

function todayStr(){
  const d=new Date(), p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

// 금액 입력 — 표시는 천단위 콤마, 값은 숫자. (시트는 별도 콤마 서식이라 저장은 순수 숫자)
function parseAmt(v){ return Number(String(v==null?"":v).replace(/,/g,"")) || 0; }
function fmtAmtStr(v){   // 숫자/문자 → "1,000" / "1,000.5" (수정 모드 값 채울 때)
  if(v==null || v==="") return "";
  const s=String(v).replace(/,/g,"");
  const dot=s.indexOf(".");
  if(dot===-1) return (Number(s)||0).toLocaleString("en-US");
  const intp=s.slice(0,dot), frac=s.slice(dot+1);
  return ((Number(intp)||0).toLocaleString("en-US"))+"."+frac;
}
// 입력 중 라이브 포맷 (숫자·소수점만 허용, 정수부에 콤마)
function fmtAmountInput(el){
  let v=el.value.replace(/[^\d.]/g,"");
  const i=v.indexOf(".");
  if(i!==-1) v=v.slice(0,i+1)+v.slice(i+1).replace(/\./g,"");   // 점 하나만
  if(v===""){ el.value=""; return; }
  if(v==="."){ el.value="0."; return; }
  let intp=v, frac=null;
  const dot=v.indexOf(".");
  if(dot!==-1){ intp=v.slice(0,dot); frac=v.slice(dot+1); }
  intp=intp.replace(/^0+(?=\d)/,"");                            // 선행 0 제거
  const intFmt=intp ? Number(intp).toLocaleString("en-US") : "0";
  el.value = (frac===null) ? intFmt : intFmt+"."+frac;
}

function fillAccounts(){

// 사용 가능한 통화 옵션 — 현지화2 는 이름이 설정된 경우만 노출
function currencyOptions(){
  return CURRENCIES.filter(c=> c.key!=="현지화2" || !!local2Name)
                   .map(c=>({ key:c.key, label: curLabel_(c.key) }));
}
// 통화 코드 → 표시 이름 (원화·달러 고정 / 현지화1=LOCAL1 / 현지화2=설정값). 이미 이름이면 그대로.
function curLabel_(k){
  if(k==="원화") return "원화";
  if(k==="달러") return "달러";
  if(k==="현지화1") return LOCAL1[team] || "현지화1";
  if(k==="현지화2") return local2Name || "현지화2";
  return (CURRENCIES.find(c=>c.key===k)||{label:k}).label;
}
// rateCfg 라벨을 팀 고정 이름으로 보정(환율값은 보존). 오프라인·첫 실행에도 이름이 정확히 뜨게.
function seedRateCfg(){
  const r = rateCfg || {};
  const keepRate = k => (r[k] && typeof r[k].rate === "number") ? r[k].rate : 0;
  rateCfg = {
    "달러":   { label:"달러",                 rate:keepRate("달러") },
    "현지화1": { label:(LOCAL1[team]||"현지화1"), rate:keepRate("현지화1") },
    "현지화2": { label:(local2Name||"현지화2"),   rate:keepRate("현지화2") }
  };
}
function fillCurSelect(s){
  if(!s) return;
  const keep=s.value;
  s.innerHTML="";
  currencyOptions().forEach(c=>{ const o=document.createElement("option"); o.value=c.key; o.textContent=c.label; s.appendChild(o); });
  if(keep && currencyOptions().some(c=>c.key===keep)) s.value=keep;
}
function fillCurrencies(){
  fillCurSelect($("f-currency"));
  fillCurSelect($("fx-from-cur"));
  fillCurSelect($("fx-to-cur"));
  updatePreview();
}
function updatePreview(){
  const el=$("krw-preview"); if(!el) return;
  const cur=$("f-currency").value, amt=parseAmt($("f-amount").value);
  if(!amt){ el.textContent=""; el.className="krw"; return; }
  if(cur==="원화"){ el.textContent=`= ${Math.round(amt).toLocaleString()}원`; el.className="krw ok"; return; }
  const c=rateCfg[cur];
  if(c && c.rate){ el.textContent=`≈ ${Math.round(amt*c.rate).toLocaleString()}원 (저장된 환율 기준, 연결 시 확정)`; el.className="krw ok"; }
  else { el.textContent="환율 정보 없음 — 연결되면 자동 계산"; el.className="krw warn"; }
}

function applyRates(rates){
  if(!rates) return;
  // 다른 기기/운영자가 현지화2 이름을 시트에 넣어둔 경우, 로컬이 비어 있으면 채택

    local2Name = String(rates.local2.name).trim();

  }
  const rv = s => (s && typeof s.rate === "number") ? s.rate : 0;
  rateCfg = {
    "달러":   { label:"달러",                 rate:rv(rates.usd) },
    "현지화1": { label:(LOCAL1[team]||"현지화1"), rate:rv(rates.local1) },
    "현지화2": { label:(local2Name||"현지화2"),   rate:rv(rates.local2) }
  };
  localStorage.setItem("igw_rates_"+team, JSON.stringify(rateCfg));
  fillCurrencies();
  renderFxRates();
}

// [§14] 현재 환율 카드 (읽기 전용) + 현지화2(경유 통화) 설정 컨트롤
function renderFxRates(){
  const box=$("fx-rates"); if(!box) return;
  const slots=[["달러","달러"],["현지화1","현지화1"],["현지화2","현지화2"]];
  let html="";
  slots.forEach(([k,code])=>{
    const r=rateCfg[k];
    if(k==="현지화2" && !local2Name) return;   // 미설정 숨김
    const name=(r&&r.label)||code;
    const val=(r&&r.rate)
      ? `${r.rate.toLocaleString(undefined,{maximumFractionDigits:6})}원`
      : `<span class="fx-na">연결 시 계산</span>`;
    html+=`<div class="fx-rate-row"><span class="fx-rate-name">${name}</span><span class="fx-rate-val">1 ${name} = ${val}</span></div>`;
  });
  if(!html) html=`<div class="fx-rate-empty">아직 환율 정보가 없어요.<br>환전을 입력하고 연결하면 자동으로 계산됩니다.</div>`;
  // 현지화2(경유 통화) 설정/수정
  html += local2Name
    ? `<div class="fx-l2"><span>경유 통화 <b>${local2Name}</b> 🔒</span><button type="button" id="fx-l2-edit" class="fx-l2-btn">이름 수정</button></div>`
    : `<button type="button" id="fx-l2-set" class="fx-l2-add">＋ 경유 통화(현지화2) 설정</button>`;
  box.innerHTML = html;
}

  if(!cfg || !cfg.url){ toast("동기화 URL이 설정되지 않았어요"); return; }
  const cur = local2Name || "";
  const msg = cur
    ? `경유 통화(현지화2) 이름 변경\n현재: ${cur}\n\n새 이름을 입력하세요 (기존 환전 기록도 같이 바뀝니다)`
    : `경유 통화(현지화2) 이름을 입력하세요.\n달러 외에 거쳐가는 현지 통화 (예: THB, USD)`;
  let v = prompt(msg, cur);
  if(v===null) return;
  v = v.trim();
  if(!v || v===cur) return;
  const taken = ["원화","달러",(LOCAL1[team]||"")].filter(Boolean);
  if(taken.includes(v)){ toast("이미 쓰는 통화명이에요"); return; }
  try{
    const r = await postAction(cfg, { secret:cfg.secret, action:"fxRenameCurrency", team, slot:"local2", oldName:cur, newName:v });
    if(r && r.ok){
      local2Name = v; localStorage.setItem("igw_local2_"+team, v);
      seedRateCfg(); fillCurrencies(); renderFxRates();
      await fxRefresh(false);
      toast(cur ? "통화명 변경됨" : "경유 통화 설정됨");
    } else { toast("설정 실패: "+((r&&r.error)||"서버 오류")); }
  }catch(err){ toast("설정 중 오류 — 다시 시도하세요"); console.error(err); }
}

// [§14] 환전 입력 미리보기 — 이번 거래 기준 단순 환율(참고용)
function fxPreview(){
  const el=$("fx-preview"); if(!el) return;
  const fa=parseAmt($("fx-from-amt").value), ta=parseAmt($("fx-to-amt").value);
  const fc=$("fx-from-cur").value, tc=$("fx-to-cur").value;

  if(fc==="원화" && tc!=="원화"){
    el.textContent=`이번 거래: 1 ${curLabel_(tc)} = ${(fa/ta).toLocaleString(undefined,{maximumFractionDigits:4})}원`;
    el.className="krw ok";
  } else if(tc==="원화" && fc!=="원화"){
    el.textContent=`이번 거래: 1 ${curLabel_(fc)} = ${(ta/fa).toLocaleString(undefined,{maximumFractionDigits:4})}원 (반납)`;
    el.className="krw ok";
  } else {
    el.textContent=`경유 환전 (${curLabel_(fc)}→${curLabel_(tc)}) — 평균환율은 연결 시 시트가 계산`;
    el.className="krw warn";
  }
}

// [§14] 환전 사진 추가/표시 (원장과 동일 파이프라인: 1280·0.7·base64)
async function fxAddPhotos(files){
  let skipped=0;
  for(const f of files){
    const blob=await compress(f); if(!blob){ skipped++; continue; }
    const b64=await blobToB64(blob); if(!b64){ skipped++; continue; }
    fxPhotos.push({ blob, b64, size:blob.size, url:URL.createObjectURL(blob) });
  }
  renderFxPhotos();
  if(skipped) toast(`사진 ${skipped}장은 형식을 변환할 수 없어 제외됐어요. 다시 촬영해 주세요.`);
}
function renderFxPhotos(){
  const box=$("fx-photos");
  box.querySelectorAll(".thumb-box").forEach(n=>n.remove());
  const add=box.querySelector(".addphoto");
  fxPhotos.forEach((p,i)=>{
    const d=document.createElement("div"); d.className="thumb-box";
    d.innerHTML=`<img class="thumb" src="${p.url}"><div class="thumb-x" data-i="${i}">×</div>`;
    box.insertBefore(d, add);
  });
}

// [§14] 환전 저장 (신규 / 수정 분기)
async function fxSaveNew(){
  const fa=parseAmt($("fx-from-amt").value), ta=parseAmt($("fx-to-amt").value);
  if(!fa || !ta){ toast("준 금액과 받은 금액을 입력하세요"); return; }

/* 사진 추가/표시 */
async function addPhotos(files){
  let skipped=0;
  for(const f of files){
    const blob = await compress(f);
    if(!blob){ skipped++; continue; }                 // 변환 안 되는 사진은 제외
    const b64 = await blobToB64(blob);                 // 캡처 직후(메모리 신선) 텍스트로 변환 → 아이폰 IndexedDB blob 손상 회피
    if(!b64){ skipped++; continue; }
    photos.push({ blob, b64, size:blob.size, url:URL.createObjectURL(blob) });
  }
  if(photos.length) setReceipt("O");   // 사진이 있으면 영수증 자동 O
  renderPhotos();
  if(skipped) toast(`사진 ${skipped}장은 형식을 변환할 수 없어 제외됐어요. 다시 촬영해 주세요.`);
}

  photos.forEach((p,i)=>{

    d.innerHTML=`<img class="thumb" src="${p.url}"><div class="thumb-x" data-i="${i}">×</div>`;

  if(!amount){ toast("사용 금액을 입력하세요"); return; }

  $("btn-save").disabled=true;
  const curKey = $("f-currency").value;
  let krw = null;
  if(curKey==="원화") krw = Math.round(amount);
  else if(rateCfg[curKey] && rateCfg[curKey].rate) krw = Math.round(amount*rateCfg[curKey].rate);

  try{
    if(editingId){
      // ----- 수정 -----
      const all = await getAll();
      const e = all.find(x=>x.id===editingId);
      if(!e){ toast("내역을 찾을 수 없어요"); return; }
      if(e.syncState === "삭제대기"){ toast("삭제 대기 항목은 수정할 수 없어요"); return; }

      e.type = type;

      e.fund = $("f-fund").value;
      e.date = $("f-date").value;

      e.krw = krw;
      e.note = $("f-note").value.trim();
      e.receipt = receiptYN;
      // 상태 전이: 완료 → 수정대기, 대기/수정대기는 그대로
      if(e.syncState === "완료") e.syncState = "수정대기";

      await saveEntry(e);
      const no = e.receiptNo;
      cancelEdit();
      switchTab("list");
      toast(`수정됨 · 영수증 #${no}`);
    } else {
      // ----- 신규 -----
      const seq = (parseInt(localStorage.getItem("igw_seq_"+team)||"0",10))+1;
      const entry = {
        id: Date.now()+"-"+Math.random().toString(36).slice(2,7),
        team, division:DIVISION, type,
        account: $("f-account").value,
        fund: $("f-fund").value,
        date: $("f-date").value,
        desc: $("f-desc").value.trim(),
        currency: curKey,
        amount: Number(amount),
        krw,
        note: $("f-note").value.trim(),
        receipt: receiptYN,
        receiptNo: seq,
        photos: photos.map(p=>({ b64:p.b64, size:p.size })),
        photoCount: photos.length,
        syncState: "대기",
        createdAt: Date.now()
      };
      await saveEntry(entry);
      localStorage.setItem("igw_seq_"+team, String(seq));
      resetForm();
      toast(`저장됨 · 영수증 #${seq}`);
    }
  }catch(err){
    toast(editingId ? "수정 실패 — 다시 시도하세요" : "저장 실패 — 다시 시도하세요");
    console.error(err);
  }finally{
    $("btn-save").disabled=false;
  }
}

function sheetPhotoLinks_(raw){
  const urls = String(raw||"").split("\n").map(u=>u.trim()).filter(u=>/^https?:\/\//.test(u));
  if(!urls.length) return `<div class="meta">사진 없음</div>`;
  const links = urls.map((u,i)=>
    `<a class="sheet-photo" href="${u}" target="_blank" rel="noopener">📎 사진 보기${urls.length>1?" "+(i+1):""}</a>`
  ).join("");
  return `<div class="meta sheet-photos">${links}</div>`;
}

      </div>

        <span class="bd ${e.type==="지출"?"bd-exp":"bd-inc"}">${e.type}</span>

/* 토스트 */
let toastT;
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1900);
}

/* 깨진 b64 썸네일/사진 폴백 — 디코드 실패 시 깨진 아이콘 대신 안내 박스로 교체 */
function imgBroken(el){
  el.onerror = null;
  const d = document.createElement("div");
  d.className = el.className ? el.className + " img-broken" : "img-broken";
  d.textContent = "⚠ 사진 깨짐";
  el.replaceWith(d);
}

/* =====================================================================
   동기화 — 연결되면 구글시트로 한 건씩 전송 (행 데이터 + 영수증 사진)
   사진은 압축본을 base64로 함께 보냄 → 서버가 드라이브 저장 후 K열에 링크
   실패/끊김 시 중단하고 다음에 이어서 재시도 (완료된 건은 다시 안 보냄)
   ===================================================================== */
function blobToB64(blob){
  return new Promise((res)=>{
    const r=new FileReader();
    r.onload=()=>res(String(r.result).split(",")[1]||null);  // 순수 base64만, 실패 시 null
    r.onerror=()=>res(null);
    r.readAsDataURL(blob);
  });
}
async function serialize(e){
  const photos=(e.photos||[])
    .filter(p=>!(p instanceof Blob))        // 구버전(blob) 항목은 무시 (옛 테스트 데이터)
    .map(p=>({ data:p.b64, size:p.size }));
  return { id:e.id, team:e.team, type:e.type, account:e.account, fund:e.fund,
           date:e.date, desc:e.desc, currency:e.currency, amount:e.amount,
           note:e.note, receipt:e.receipt, receiptNo:e.receiptNo, photos };
}
async function postEntry(cfg, e){
  const res = await fetch(cfg.url, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },  // preflight 회피 (Apps Script)
    body: JSON.stringify({ secret:cfg.secret, entry: await serialize(e) })
  });
  return res.json();
}
async function postAction(cfg, body){
  const res = await fetch(cfg.url, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body: JSON.stringify(body)
  });
  return res.json();
}
async function syncNow(manual){
  if(syncing) return;
  const cfg = SYNC[team];
  if(!cfg || !cfg.url){ if(manual) toast("동기화 URL이 설정되지 않았어요"); return; }
  if(!navigator.onLine){ if(manual) toast("인터넷에 연결돼 있지 않아요"); return; }

  const pending = (await getAll()).filter(e=>e.syncState!=="완료").sort((a,b)=>a.createdAt-b.createdAt);
  if(pending.length===0){ if(manual) toast("동기화할 내역이 없어요"); return; }

  syncing=true; setSyncing(true);
  let ok=0;
  for(const e of pending){
    try{
      let r;
      if(e.syncState === "삭제대기"){
        r = await postAction(cfg, { action:"delete", secret:cfg.secret, team:e.team, id:e.id });
        if(r && r.ok){ await delEntry(e.id); ok++; }
        else { toast("동기화 중단: "+((r&&r.error)||"서버 오류")); break; }
      } else if(e.syncState === "수정대기"){
        r = await postAction(cfg, {
          action:"update", secret:cfg.secret, team:e.team, id:e.id,
          date:e.date, account:e.account, fund:e.fund, desc:e.desc,
          amount:e.amount, currency:e.currency, receipt:e.receipt, note:e.note
        });
        if(r && r.ok){
          if(r.missing){ await delEntry(e.id); }      // 시트에서 수동 삭제됨 → 유령 카드 정리
          else { e.syncState = "완료"; await saveEntry(e); }
          ok++;
        } else { toast("동기화 중단: "+((r&&r.error)||"서버 오류")); break; }
      } else {
        // 대기 → 신규 생성
        r = await postEntry(cfg, e);
        if(r && r.ok){
          e.syncState="완료";
          e.photoFail = (r.photoFail||0)>0;
          e.syncedRow = r.row;
          await saveEntry(e); ok++;
        } else { toast("동기화 중단: "+((r&&r.error)||"서버 오류")); break; }
      }
      $("sync-status").textContent=`올리는 중… ${ok}/${pending.length}`;
    }catch(err){ toast("연결이 끊겨 중단됐어요 (다음에 이어서)"); break; }
  }
  syncing=false; setSyncing(false);
  $("sync-status").textContent="";
  renderList();
  if(ok>0) toast(`동기화 ${ok}/${pending.length}건 완료`);
}

/* ===== Phase 2-4 (조각1): 내려받기 머지 코어 =====
   pull → 시트 rows 를 IndexedDB 에 병합. 시트로 push 하지 않는다(읽기+로컬 병합만). */

// 시트 row → 로컬 entry 형태로 변환 (type 은 krwIn/krwOut 으로 유추)
function sheetRowToEntry_(r){
  const isIncome = Number(r.krwIn) > 0;
  return {
    id: String(r.id),
    team: team,
    division: DIVISION,
    type: isIncome ? "수입" : "지출",
    account: r.account || "",
    fund: r.fund || "",
    date: r.date || "",
    desc: r.desc || "",
    currency: r.currency || "원화",
    amount: Number(r.amount) || 0,
    krw: isIncome ? (Number(r.krwIn) || null) : (Number(r.krwOut) || null),
    note: r.note || "",
    receipt: r.receipt || "",
    receiptNo: (r.receiptNo == null ? null : r.receiptNo),
    photos: [],
    sheetPhoto: r.photo || "",
    photoCount: 0,
    syncState: "완료",
    syncedRow: r.row,
    createdAt: Date.now()
  };
}

// 시트값으로 갱신: 회계 데이터만 덮고 로컬 사진(base64)·생성시각은 보존
function applySheetValues_(local, r){
  const isIncome = Number(r.krwIn) > 0;
  local.type      = isIncome ? "수입" : "지출";
  local.account   = r.account || "";
  local.fund      = r.fund || "";
  local.date      = r.date || "";
  local.desc      = r.desc || "";
  local.currency  = r.currency || "원화";
  local.amount    = Number(r.amount) || 0;
  local.krw       = isIncome ? (Number(r.krwIn) || null) : (Number(r.krwOut) || null);
  local.note      = r.note || "";
  local.receipt   = r.receipt || "";
  local.receiptNo = (r.receiptNo == null ? null : r.receiptNo);
  local.syncedRow = r.row;
  if(r.photo) local.sheetPhoto = r.photo;
  if(local.mirrorFlag) delete local.mirrorFlag;
  return local;
}

// 시트 행 r 과 로컬 e 의 회계 값이 실질적으로 다른지(충돌 표시 판단용)
function sheetDiffers_(e, r){
  const isIncome = Number(r.krwIn) > 0;
  const rType = isIncome ? "수입" : "지출";
  return (e.account||"") !== (r.account||"") ||
         (e.fund||"")    !== (r.fund||"")    ||
         (e.date||"")    !== (r.date||"")    ||
         (e.desc||"")    !== (r.desc||"")    ||
         (e.currency||"")!== (r.currency||"")||
         (Number(e.amount)||0) !== (Number(r.amount)||0) ||
         (e.receipt||"") !== (r.receipt||"") ||
         (e.note||"")    !== (r.note||"")    ||
         (e.type||"")    !== rType;
}

// 핵심 머지 — 시트 rows 와 현재 IndexedDB 병합. {added,updated,kept,conflict,orphan} 반환
async function mergeFromSheet_(rows){
  const localAll = await getAll();
  const byId = new Map(localAll.map(e=>[String(e.id), e]));
  const sheetIds = new Set(rows.map(r=>String(r.id)).filter(Boolean));
  const stat = { added:0, updated:0, kept:0, conflict:0, orphan:0 };

  for(const r of rows){
    const id = String(r.id||"");
    if(!id) continue;
    const local = byId.get(id);

    if(!local){
      await saveEntry(sheetRowToEntry_(r));
      stat.added++;
      continue;
    }
    const st = local.syncState || "대기";
    if(st === "완료"){
      await saveEntry(applySheetValues_(local, r));
      stat.updated++;
    } else {
      if(sheetDiffers_(local, r)){
        local.mirrorFlag = "시트와다름";
        await saveEntry(local);
        stat.conflict++;
      } else {
        if(local.mirrorFlag === "시트와다름"){ delete local.mirrorFlag; await saveEntry(local); }
        stat.kept++;
      }
    }
  }

  for(const e of localAll){
    const id = String(e.id||"");
    if(sheetIds.has(id)) continue;
    const st = e.syncState || "대기";
    if(st === "완료"){
      if(e.mirrorFlag !== "시트에없음"){ e.mirrorFlag = "시트에없음"; await saveEntry(e); }
      stat.orphan++;
    }
  }

  return stat;
}

// 내려받기 실행: pull → 머지 → 렌더. (조각1은 콘솔 테스트용; 버튼은 조각2)
let pulling = false;
async function pullNow(manual){
  if(pulling || syncing) return null;
  const cfg = SYNC[team];
  if(!cfg || !cfg.url){ if(manual) toast("동기화 URL이 설정되지 않았어요"); return null; }
  if(!navigator.onLine){ if(manual) toast("인터넷에 연결돼 있지 않아요"); return null; }

  pulling = true;
  try{
    const res = await postAction(cfg, { secret:cfg.secret, action:"pull", team });
    if(!res || !res.ok){ if(manual) toast("내려받기 실패: "+((res&&res.error)||"서버 오류")); return null; }
    const stat = await mergeFromSheet_(res.rows || []);
    await renderList();
    console.log("[pullNow] merge stat:", stat, "rows:", (res.rows||[]).length);
    if(manual){
      const parts = [];
      if(stat.added)    parts.push(`신규 ${stat.added}`);
      if(stat.updated)  parts.push(`갱신 ${stat.updated}`);
      if(stat.conflict) parts.push(`⚠충돌 ${stat.conflict}`);
      if(stat.orphan)   parts.push(`⚠시트없음 ${stat.orphan}`);
      toast(parts.length ? `내려받기: ${parts.join(" · ")}` : "내려받기: 변경 없음");
    }
    return stat;
  }catch(err){
    console.error("[pullNow]", err);
    if(manual) toast("내려받기 중 오류 — 다시 시도하세요");
    return null;
  }finally{
    pulling = false;
  }
}

function setSyncing(on){
  const b=$("btn-sync"); if(!b) return;
  b.disabled=on; b.textContent = on ? "동기화 중…" : "동기화";
}

/* =====================================================================
   [§14] 환전 동기화 — fxCreate / fxDelete / fxPull(rates+머지)
   ===================================================================== */
function setFxSyncing(on){ const b=$("btn-fx-sync"); if(!b) return; b.disabled=on; b.textContent=on?"동기화 중…":"동기화"; }

function fxSerialize_(e){
  const photos=(e.photos||[]).filter(p=>!(p instanceof Blob)).map(p=>({ data:p.b64, size:p.size }));
  return { id:e.id, team:e.team, date:e.date, fromCurrency:e.fromCurrency, fromAmount:e.fromAmount,
           toCurrency:e.toCurrency, toAmount:e.toAmount, memo:e.memo, photos };
}

// 미동기화 환전 올리기 (대기→fxCreate / 삭제대기→fxDelete)
async function fxSyncNow(manual){
  if(fxSyncing || fxPulling) return;
  const cfg=SYNC[team];
  if(!cfg || !cfg.url){ if(manual) toast("동기화 URL이 설정되지 않았어요"); return; }
  if(!navigator.onLine){ if(manual) toast("인터넷에 연결돼 있지 않아요"); return; }
  const pending=(await fxGetAll()).filter(e=>e.syncState!=="완료").sort((a,b)=>a.createdAt-b.createdAt);
  if(pending.length===0){ if(manual) toast("동기화할 환전 내역이 없어요"); return; }

  fxSyncing=true; setFxSyncing(true);
  let ok=0;
  for(const e of pending){
    try{
      let r;
      if(e.syncState==="삭제대기"){
        r=await postAction(cfg, { action:"fxDelete", secret:cfg.secret, team:e.team, id:e.id });
        if(r && r.ok){ await fxDel(e.id); ok++; }
        else { toast("동기화 중단: "+((r&&r.error)||"서버 오류")); break; }
      } else if(e.syncState==="수정대기"){
        r=await postAction(cfg, { action:"fxUpdate", secret:cfg.secret, team:e.team, id:e.id,
          date:e.date, fromCurrency:e.fromCurrency, fromAmount:e.fromAmount,
          toCurrency:e.toCurrency, toAmount:e.toAmount, memo:e.memo });
        if(r && r.ok){
          if(r.missing){ await fxDel(e.id); }       // 시트에서 수동 삭제됨 → 유령 카드 정리
          else { e.syncState="완료"; await fxSave(e); }
          ok++;
        } else { toast("동기화 중단: "+((r&&r.error)||"서버 오류")); break; }
      } else {
        r=await postAction(cfg, { action:"fxCreate", secret:cfg.secret, entry: fxSerialize_(e) });
        if(r && r.ok){ e.syncState="완료"; e.photoFail=(r.photoFail||0)>0; e.syncedRow=r.row; await fxSave(e); ok++; }
        else { toast("동기화 중단: "+((r&&r.error)||"서버 오류")); break; }
      }
      $("fx-sync-status").textContent=`올리는 중… ${ok}/${pending.length}`;
    }catch(err){ toast("연결이 끊겨 중단됐어요 (다음에 이어서)"); break; }
  }
  fxSyncing=false; setFxSyncing(false);
  $("fx-sync-status").textContent="";
  if(ok>0 && navigator.onLine) await fxRefresh(false);   // 환전이 올라갔으면 환율도 바뀜 → 갱신
  await renderFxList();
  if(ok>0) toast(`환전 ${ok}/${pending.length}건 완료`);
}

// 내려받기: rates 갱신 + 환전 목록 머지
async function fxRefresh(manual){
  if(fxPulling || fxSyncing) return null;
  const cfg=SYNC[team];
  if(!cfg || !cfg.url){ if(manual) toast("동기화 URL이 설정되지 않았어요"); return null; }
  if(!navigator.onLine){ if(manual) toast("인터넷에 연결돼 있지 않아요"); return null; }
  fxPulling=true;
  try{
    const res=await postAction(cfg, { secret:cfg.secret, action:"fxPull", team });
    if(!res || !res.ok){ if(manual) toast("내려받기 실패: "+((res&&res.error)||"서버 오류")); return null; }
    if(res.rates) applyRates(res.rates);
    const stat=await fxMerge_(res.rows||[]);
    await renderFxList();
    if(manual) toast("환율·환전 내역 갱신됨");
    return stat;
  }catch(err){ if(manual) toast("내려받기 오류 — 다시 시도하세요"); console.error("[fxRefresh]",err); return null; }
  finally{ fxPulling=false; }
}

function fxRowToEntry_(r){
  return { id:String(r.id), team, date:r.date||"",
    fromCurrency:r.fromCurrency||"", fromAmount:Number(r.fromAmount)||0,
    toCurrency:r.toCurrency||"", toAmount:Number(r.toAmount)||0,
    memo:r.memo||"", photos:[], sheetPhoto:r.photo||"",
    syncState:"완료", syncedRow:r.row, createdAt:Date.now() };
}
function fxApply_(local, r){
  local.date=r.date||""; local.fromCurrency=r.fromCurrency||""; local.fromAmount=Number(r.fromAmount)||0;
  local.toCurrency=r.toCurrency||""; local.toAmount=Number(r.toAmount)||0; local.memo=r.memo||"";
  local.syncedRow=r.row; if(r.photo) local.sheetPhoto=r.photo;
  if(local.mirrorFlag) delete local.mirrorFlag;
  return local;
}
async function fxMerge_(rows){
  const localAll=await fxGetAll();
  const byId=new Map(localAll.map(e=>[String(e.id), e]));
  const sheetIds=new Set(rows.map(r=>String(r.id)).filter(Boolean));
  let added=0, updated=0, kept=0, orphan=0;
  for(const r of rows){
    const id=String(r.id||""); if(!id) continue;
    const local=byId.get(id);
    if(!local){ await fxSave(fxRowToEntry_(r)); added++; continue; }
    if((local.syncState||"대기")==="완료"){ await fxSave(fxApply_(local,r)); updated++; }
    else kept++;
  }
  for(const e of localAll){
    if(sheetIds.has(String(e.id||""))) continue;
    if((e.syncState||"대기")==="완료"){ if(e.mirrorFlag!=="시트에없음"){ e.mirrorFlag="시트에없음"; await fxSave(e); } orphan++; }
  }
  return { added, updated, kept, orphan };
}

async function renderFxList(){
  const all=(await fxGetAll()).sort((a,b)=>b.createdAt-a.createdAt);
  const pend=all.filter(e=>e.syncState!=="완료").length;
  const cEl=$("fx-count"); if(cEl) cEl.textContent=`환전 ${all.length}건 · 미동기화 ${pend}건`;
  const box=$("fx-list"); if(!box) return;
  if(all.length===0){ box.innerHTML=`<div class="empty">아직 환전 내역이 없어요.<br>위에서 환전 거래를 입력해보세요.</div>`; return; }
  box.innerHTML="";
  all.forEach(e=>{
    const s=e.syncState||"대기";
    const badge = s==="완료" ? `<span class="bd bd-inc">● 완료</span>`
      : s==="수정대기" ? `<span class="bd bd-edit">수정 대기</span>`
      : s==="삭제대기" ? `<span class="bd bd-del">삭제 대기</span>`
      : `<span class="bd bd-wait">● 대기</span>`;
    const imgs=(e.photos||[]).map(p=>{
      const src=(p && p.b64) ? "data:image/jpeg;base64,"+p.b64 : "";
      return src ? `<img class="thumb" src="${src}" onerror="imgBroken(this)">` : "";
    }).join("");
    const d=document.createElement("div"); d.className="item"; d.dataset.fxid=e.id;
    d.innerHTML=`
      <div class="top">
        <div style="min-width:0">
          <div class="num">${e.date||"-"}</div>
          <div class="acct">${(e.fromAmount||0).toLocaleString()} ${curLabel_(e.fromCurrency)} <span class="fx-arrow">→</span> ${(e.toAmount||0).toLocaleString()} ${curLabel_(e.toCurrency)}</div>
        </div>
        <button class="more-btn" data-fxid="${e.id}" aria-label="수정·삭제·사진">⋯</button>
      </div>
      <div class="badges">${badge}${e.photoFail?`<span class="bd bd-fail">⚠ 사진 실패</span>`:""}${e.mirrorFlag?`<span class="bd bd-mirror">⚠ ${e.mirrorFlag}</span>`:""}</div>
      ${imgs ? `<div class="imgs">${imgs}</div>` : (e.sheetPhoto ? sheetPhotoLinks_(e.sheetPhoto) : "")}
      ${e.memo?`<div class="memo">📝 ${e.memo}</div>`:""}`;
    box.appendChild(d);
  });
}

// 환전 삭제 (대기→즉시 제거 / 완료·수정대기→삭제대기 후 동기화. delete wins)
async function fxDeleteCard(id){
  const all=await fxGetAll(); const e=all.find(x=>x.id===id); if(!e) return;
  if(!confirm("이 환전 내역을 삭제할까요?")) return;
  if((e.syncState||"대기")==="대기"){
    await fxDel(id); await renderFxList(); toast("삭제됨");
  } else {
    e.syncState="삭제대기"; await fxSave(e);   // 완료·수정대기 모두 삭제대기로
    await renderFxList();
    toast("삭제 대기 — 다음 동기화에서 시트도 삭제");
    if(navigator.onLine) await fxSyncNow(false);
  }
}

/* =====================================================================
   [§14-2단계] 환전 액션시트 / 수정 / 사진 관리 (원장과 분리)
   ===================================================================== */

}
function closeFxActionSheet(){ $("fx-action-sheet").classList.add("hidden"); fxActionTargetId=null; }
async function fxDoEdit(){

async function fxDoDelete(){

// 환전 사진 관리 — 동기화된(완료) 항목의 G열 사진을 추가/단건삭제 (원장 photo-mgr 의 환전판)
async function openFxPhotoMgr(entry){
  if(entry.syncState!=="완료"){ toast("먼저 동기화한 뒤 사진을 관리할 수 있어요"); return; }
  fxPmgrTargetId = entry.id;
  $("fx-pmgr-hint").textContent="";
  $("fx-pmgr-body").innerHTML=`<div class="pmgr-empty">사진 불러오는 중…</div>`;
  $("fx-photo-mgr").classList.remove("hidden");
  if(navigator.onLine){
    const cfg=SYNC[team];
    if(cfg && cfg.url){
      try{
        const r=await postAction(cfg, { secret:cfg.secret, action:"fxPull", team });
        if(r && r.ok && Array.isArray(r.rows)){
          const mine=r.rows.find(x=>String(x.id)===String(entry.id));
          if(mine){ entry.sheetPhoto=mine.photo||""; await fxSave(entry); }
        }
      }catch(_){}
    }
  }
  if(fxPmgrTargetId===entry.id) renderFxPhotoMgr(entry);
}
function closeFxPhotoMgr(){ $("fx-photo-mgr").classList.add("hidden"); fxPmgrTargetId=null; }
function renderFxPhotoMgr(entry){
  const links=parseSheetLinks_(entry.sheetPhoto);
  const b64s=(entry.photos||[]).filter(p=>p && p.b64).map(p=>p.b64);
  const aligned=b64s.length===links.length;
  const online=navigator.onLine;
  const body=$("fx-pmgr-body");
  if(!links.length){ body.innerHTML=`<div class="pmgr-empty">아직 사진이 없어요.</div>`; }
  else {
    body.innerHTML=links.map((lk,i)=>{
      const thumb=aligned
        ? `<img class="pmgr-thumb" src="data:image/jpeg;base64,${b64s[i]}" onerror="imgBroken(this)">`
        : `<a class="pmgr-open" href="${lk.url}" target="_blank" rel="noopener">📎 사진 ${i+1}</a>`;
      return `<div class="pmgr-row">${thumb}<button class="pmgr-del" data-fileid="${lk.fileId}">삭제</button></div>`;
    }).join("");
  }
  $("fx-pmgr-add").classList.toggle("disabled", !online);
  $("fx-pmgr-hint").textContent = online ? "" : "⚠ 사진 추가·삭제는 인터넷 연결이 필요해요";
}
async function fxPmgrAdd(files){
  if(!fxPmgrTargetId) return;
  if(!navigator.onLine){ toast("인터넷에 연결돼 있지 않아요"); return; }
  const cfg=SYNC[team];
  if(!cfg || !cfg.url){ toast("동기화 URL이 설정되지 않았어요"); return; }
  const all=await fxGetAll(); const e=all.find(x=>x.id===fxPmgrTargetId);
  if(!e) return;
  toast("사진 추가하는 중…");
  const newPhotos=[]; let skipped=0;
  for(const f of files){
    const blob=await compress(f); if(!blob){ skipped++; continue; }
    const b64=await blobToB64(blob); if(!b64){ skipped++; continue; }
    newPhotos.push({ b64, size:blob.size });
  }
  if(!newPhotos.length){ toast("추가할 사진이 없어요"); return; }
  const r=await postAction(cfg, { secret:cfg.secret, action:"fxAddPhotos",
    entry:{ id:e.id, team, photos:newPhotos.map(p=>({ data:p.b64, size:p.size })) } });
  if(r && r.ok){
    e.sheetPhoto=r.photo||e.sheetPhoto;
    e.photos=(e.photos||[]).concat(newPhotos);
    e.photoFail=(r.photoFail||0)>0;
    await fxSave(e); renderFxPhotoMgr(e); renderFxList();
    toast(skipped ? `사진 ${newPhotos.length}장 추가 (${skipped}장 제외)` : "사진 추가됨");
  } else { toast("사진 추가 실패"+((r&&r.error)?": "+r.error:"")); }
}
async function fxPmgrDelete(fileId){
  if(!fxPmgrTargetId || !fileId) return;
  if(!navigator.onLine){ toast("인터넷에 연결돼 있지 않아요"); return; }
  if(!confirm("이 사진을 삭제할까요?")) return;
  const cfg=SYNC[team];
  if(!cfg || !cfg.url){ toast("동기화 URL이 설정되지 않았어요"); return; }
  const all=await fxGetAll(); const e=all.find(x=>x.id===fxPmgrTargetId);
  if(!e) return;
  const linksBefore=parseSheetLinks_(e.sheetPhoto);
  const idx=linksBefore.findIndex(x=>x.fileId===fileId);
  toast("사진 삭제하는 중…");
  const r=await postAction(cfg, { secret:cfg.secret, action:"fxDeletePhoto", entry:{ id:e.id, team }, fileId });
  if(r && r.ok){
    e.sheetPhoto=(typeof r.photo==="string") ? r.photo : (e.sheetPhoto||"");
    const b64s=(e.photos||[]).filter(p=>p && p.b64);
    if(idx>=0 && b64s.length===linksBefore.length && e.photos){ e.photos.splice(idx,1); }
    else { const remain=parseSheetLinks_(e.sheetPhoto).length; if(b64s.length>remain) e.photos=b64s.slice(0,remain); }
    await fxSave(e); renderFxPhotoMgr(e); renderFxList();
    toast(r.removed>0 ? "사진 삭제됨" : "⚠ 시트에서 링크를 못 찾음(삭제 0) — 알려주세요");
  } else { toast("사진 삭제 실패"+((r&&r.error)?": "+r.error:"")); }
}

// [Phase 2-4] 사진 크게 보기 — 앱 안 전체화면 오버레이. 아무 데나 탭하면 닫힘.
function openLightbox(entry, startIdx){
  const photos = (entry.photos||[]).filter(p=>p && (p.b64 || p instanceof Blob));
  if(!photos.length) return;
  const imgs = photos.map(p=>{
    const src = (p instanceof Blob) ? URL.createObjectURL(p) : "data:image/jpeg;base64,"+p.b64;
    return `<img src="${src}" onerror="imgBroken(this)">`;
  }).join("");
  const box = document.createElement("div");
  box.className = "lightbox";
  box.innerHTML = `<div class="lb-hint">탭하면 닫기 ✕</div>${imgs}`;
  box.addEventListener("click", ()=>box.remove());
  document.body.appendChild(box);
  const target = box.querySelectorAll("img")[startIdx||0];
  if(target) target.scrollIntoView({ block:"center" });
}

/* [Phase 3] 사진 관리 — 동기화된(완료) 항목의 K열 사진을 추가/단건삭제 */
let pmgrTargetId = null;
function parseSheetLinks_(raw){
  return String(raw||"").split("\n").map(s=>s.trim())
    .filter(s=>/^https?:\/\//.test(s))
    .map(u=>{ const m = u.match(/\/d\/([A-Za-z0-9_-]{20,})/); return { url:u, fileId: m?m[1]:"" }; })
    .filter(x=>x.fileId);
}
async function doPhotosAction(){
  if(!actionTargetId) return;
  const all = await getAll(); const e = all.find(x=>x.id===actionTargetId);
  closeActionSheet();
  if(e) openPhotoMgr(e);
}
async function openPhotoMgr(entry){
  if(entry.syncState !== "완료"){ toast("먼저 동기화한 뒤 사진을 관리할 수 있어요"); return; }
  pmgrTargetId = entry.id;
  // 앱에서 직접 입력한 항목은 로컬에 시트 사진링크(sheetPhoto)가 없음 → 온라인이면 시트에서 그 행을 읽어와 최신화
  $("pmgr-hint").textContent = "";
  $("pmgr-body").innerHTML = `<div class="pmgr-empty">사진 불러오는 중…</div>`;
  $("photo-mgr").classList.remove("hidden");
  if(navigator.onLine){
    const cfg = SYNC[team];
    if(cfg && cfg.url){
      try{
        const r = await postAction(cfg, { secret:cfg.secret, action:"pull", team });
        if(r && r.ok && Array.isArray(r.rows)){
          const mine = r.rows.find(x=>String(x.id)===String(entry.id));
          if(mine){ entry.sheetPhoto = mine.photo || ""; await saveEntry(entry); }
        }
      }catch(_){}
    }
  }
  if(pmgrTargetId === entry.id) renderPhotoMgr(entry);  // 그새 닫혔으면 렌더 스킵
}
function closePhotoMgr(){ $("photo-mgr").classList.add("hidden"); pmgrTargetId = null; }
function renderPhotoMgr(entry){
  const links = parseSheetLinks_(entry.sheetPhoto);
  const b64s = (entry.photos||[]).filter(p=>p && p.b64).map(p=>p.b64);
  const aligned = b64s.length === links.length;
  const online = navigator.onLine;
  const body = $("pmgr-body");
  if(!links.length){ body.innerHTML = `<div class="pmgr-empty">아직 사진이 없어요.</div>`; }
  else {
    body.innerHTML = links.map((lk,i)=>{
      const thumb = aligned
        ? `<img class="pmgr-thumb" src="data:image/jpeg;base64,${b64s[i]}" onerror="imgBroken(this)">`
        : `<a class="pmgr-open" href="${lk.url}" target="_blank" rel="noopener">📎 사진 ${i+1}</a>`;
      return `<div class="pmgr-row">${thumb}<button class="pmgr-del" data-fileid="${lk.fileId}">삭제</button></div>`;
    }).join("");
  }
  $("pmgr-add").classList.toggle("disabled", !online);
  $("pmgr-hint").textContent = online ? "" : "⚠ 사진 추가·삭제는 인터넷 연결이 필요해요";
}
async function pmgrAdd(files){
  if(!pmgrTargetId) return;
  if(!navigator.onLine){ toast("인터넷에 연결돼 있지 않아요"); return; }
  const cfg = SYNC[team];
  if(!cfg || !cfg.url){ toast("동기화 URL이 설정되지 않았어요"); return; }
  const all = await getAll(); const e = all.find(x=>x.id===pmgrTargetId);
  if(!e) return;
  toast("사진 추가하는 중…");
  const newPhotos = []; let skipped = 0;
  for(const f of files){
    const blob = await compress(f); if(!blob){ skipped++; continue; }
    const b64 = await blobToB64(blob); if(!b64){ skipped++; continue; }
    newPhotos.push({ b64, size: blob.size });
  }
  if(!newPhotos.length){ toast("추가할 사진이 없어요"); return; }
  const r = await postAction(cfg, { secret: cfg.secret, action: "addPhotos",
    entry: { id: e.id, team, photos: newPhotos.map(p=>({ data:p.b64, size:p.size })) } });
  if(r && r.ok){
    e.sheetPhoto = r.photo || e.sheetPhoto;
    e.photos = (e.photos||[]).concat(newPhotos);
    e.photoFail = (r.photoFail||0) > 0;
    await saveEntry(e); renderPhotoMgr(e); renderList();
    toast(skipped ? `사진 ${newPhotos.length}장 추가 (${skipped}장 제외)` : "사진 추가됨");
  } else { toast("사진 추가 실패" + ((r&&r.error)?": "+r.error:"")); }
}
async function pmgrDelete(fileId){
  if(!pmgrTargetId || !fileId) return;
  if(!navigator.onLine){ toast("인터넷에 연결돼 있지 않아요"); return; }
  if(!confirm("이 사진을 삭제할까요?")) return;
  const cfg = SYNC[team];
  if(!cfg || !cfg.url){ toast("동기화 URL이 설정되지 않았어요"); return; }
  const all = await getAll(); const e = all.find(x=>x.id===pmgrTargetId);
  if(!e) return;
  const linksBefore = parseSheetLinks_(e.sheetPhoto);
  const idx = linksBefore.findIndex(x => x.fileId === fileId);   // 삭제할 사진의 위치
  toast("사진 삭제하는 중…");
  const r = await postAction(cfg, { secret: cfg.secret, action: "deletePhoto",
    entry: { id: e.id, team }, fileId });
  if(r && r.ok){
    e.sheetPhoto = (typeof r.photo === "string") ? r.photo : (e.sheetPhoto || "");  // 시트 실제 상태 기준
    const b64s = (e.photos || []).filter(p => p && p.b64);
    if(idx >= 0 && b64s.length === linksBefore.length && e.photos){
      e.photos.splice(idx, 1);                 // 같은 위치의 로컬 썸네일 1장만 제거
    } else {
      const remain = parseSheetLinks_(e.sheetPhoto).length;      // 못 짚으면 수만 맞춤(폴백)
      if(b64s.length > remain) e.photos = b64s.slice(0, remain);
    }
    await saveEntry(e); renderPhotoMgr(e); renderList();
    toast(r.removed > 0 ? "사진 삭제됨" : "⚠ 시트에서 링크를 못 찾음(삭제 0) — 알려주세요");
  } else { toast("사진 삭제 실패" + ((r && r.error) ? ": " + r.error : "")); }
}
async function doEditAction(){
  if(!actionTargetId) return;
  const all = await getAll();
  const e = all.find(x=>x.id===actionTargetId);
  if(!e){ closeActionSheet(); return; }
  if(e.syncState === "삭제대기"){ closeActionSheet(); return; }
  closeActionSheet();
  openEdit(e);
}
async function doDeleteAction(){
  if(!actionTargetId) return;
  const id = actionTargetId;
  closeActionSheet();
  if(!confirm("이 내역을 삭제할까요?")) return;
  const all = await getAll();
  const e = all.find(x=>x.id===id);
  if(!e) return;
  if(e.syncState === "대기"){
    await delEntry(e.id);
    toast("삭제됨");
  } else {
    e.syncState = "삭제대기";   // 수정대기 → 삭제대기 (delete wins)도 포함
    await saveEntry(e);
    toast("삭제 대기 — 다음 동기화에서 시트도 삭제");
  }
  renderList();
}

/* 사진 다시 올리기 — 행은 그대로, K열 사진만 교체 */
async function retryPhotos(id, files){
  const cfg = SYNC[team];
  if(!cfg || !cfg.url){ toast("동기화 URL이 설정되지 않았어요"); return; }
  if(!navigator.onLine){ toast("인터넷에 연결돼 있지 않아요"); return; }
  const all = await getAll();
  const e = all.find(x=>x.id===id);
  if(!e){ toast("내역을 찾을 수 없어요"); return; }

  toast("사진 다시 올리는 중…");
  const newPhotos=[];
  let skipped=0;
  for(const f of files){
    const blob = await compress(f);
    if(!blob){ skipped++; continue; }
    const b64 = await blobToB64(blob);
    if(!b64){ skipped++; continue; }
    newPhotos.push({ b64, size:blob.size });
  }
  if(!newPhotos.length){ toast("올릴 수 있는 사진이 없어요"); return; }

  try{
    const res = await fetch(cfg.url, {
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify({
        secret: cfg.secret,
        retryPhotos: true,
        entry: {
          id: e.id, team: e.team, receiptNo: e.receiptNo,
          date: e.date, account: e.account,
          photos: newPhotos.map(p=>({ data:p.b64, size:p.size }))
        }
      })
    });
    const r = await res.json();
    if(r && r.ok && (r.photoFail||0)===0){
      e.photos = newPhotos;
      e.photoCount = newPhotos.length;
      e.photoFail = false;
      e.receipt = "O";
      await saveEntry(e);
      renderList();
      toast(skipped ? `사진 ${newPhotos.length}장 올림 (${skipped}장 제외)` : "사진 다시 올리기 성공");
    } else {
      toast("사진 다시 올리기 실패" + ((r&&r.error)?": "+r.error:""));
    }
  }catch(err){
    toast("연결이 끊겨 실패했어요");
  }
}

/* 서비스워커 (오프라인에서도 앱이 열리도록) */
if("serviceWorker" in navigator){
  window.addEventListener("load", async ()=>{
    try{
      const reg = await navigator.serviceWorker.register("sw.js");
      // 새 SW 설치 감지 → 새로고침 안내. (이 코드가 깔린 v11 이후 배포부터 동작)
      reg.addEventListener("updatefound", ()=>{
        const nw = reg.installing;
        if(!nw) return;
        nw.addEventListener("statechange", ()=>{
          if(nw.state === "installed" && navigator.serviceWorker.controller){
            showUpdateBar();
          }
        });
      });
    }catch(_){}
  });
}
function showUpdateBar(){
  if(document.getElementById("updbar")) return;
  const bar = document.createElement("div");

}

/* 버전 배지 — 활성 sw 캐시 이름에서 vN을 읽어 표시 (sw.js CACHE만 올리면 자동 반영) */
async function showAppVersion(){
  const el = document.getElementById("appver");
  if(!el) return;
  try{
    const keys = await caches.keys();
    const k = keys.find(x=>x.startsWith("igw-mission-v"));

  }catch(_){ el.textContent=""; }
}
showAppVersion();
if("serviceWorker" in navigator) navigator.serviceWorker.ready.then(showAppVersion).catch(()=>{});
